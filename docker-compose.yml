services:
  frontend:
    build:
      context: ./frontend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    environment:
      - ASPNETCORE_URLS=http://+:8080
    expose:
      - "8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge